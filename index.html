<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIN Hunter Ultra-Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #02040a;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-wrapper {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* --- INPUT DESIGN --- */
        .search-section { margin-bottom: 50px; }
        
        h1 { font-weight: 300; letter-spacing: 4px; color: #94a3b8; font-size: 1.2rem; margin-bottom: 25px; }

        .input-group { position: relative; width: 300px; margin: 0 auto; }

        input {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            color: var(--accent);
            font-size: 2rem;
            padding: 15px;
            width: 100%;
            text-align: center;
            outline: none;
            letter-spacing: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            transform: scale(1.05);
        }

        #status-bar {
            margin-top: 15px;
            font-size: 0.8rem;
            height: 20px;
            color: #64748b;
            font-weight: 500;
        }

        /* --- CARD DESIGN (NEOBANK) --- */
        .card-container {
            perspective: 1000px;
            margin-top: 20px;
        }

        .credit-card {
            width: 100%;
            height: 260px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid var(--border);
            position: relative;
            padding: 35px;
            box-sizing: border-box;
            text-align: left;
            opacity: 0;
            transform: rotateX(10deg) translateY(40px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .credit-card.show {
            opacity: 1;
            transform: rotateX(0deg) translateY(0);
        }

        .chip {
            width: 55px;
            height: 42px;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-bottom: 35px;
        }

        .chip::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.1) 11px);
        }

        .bank-info {
            position: absolute;
            top: 35px;
            right: 35px;
            text-align: right;
        }

        #display-bank {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #display-country {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .card-number {
            font-size: 1.8rem;
            letter-spacing: 6px;
            color: #f1f5f9;
            font-weight: 300;
            margin-top: 10px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            margin-top: 45px;
            gap: 15px;
        }

        .data-item .label {
            font-size: 0.6rem;
            color: #475569;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 5px;
            display: block;
        }

        .data-item .value {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        /* --- UTILS --- */
        .glow { color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <section class="search-section">
            <h1>SISTEMA DE VERIFICACIÓN</h1>
            <div class="input-group">
                <input type="number" id="binInput" maxlength="6" placeholder="000000" oninput="processDiscovery()">
            </div>
            <div id="status-bar">LISTO PARA ESCANEAR</div>
        </section>

        <section class="card-container">
            <div class="credit-card" id="mainCard">
                <div class="bank-info">
                    <div id="display-bank">BANCO PRIVADO</div>
                    <div id="display-country">DESCONOCIDO</div>
                </div>
                <div class="chip"></div>
                <div class="card-number" id="display-num">0000 00XX XXXX</div>
                
                <div class="data-grid">
                    <div class="data-item">
                        <span class="label">Marca</span>
                        <span class="value" id="display-brand">N/A</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Tipo</span>
                        <span class="value" id="display-type">N/A</span>
                    </div>
                    <div class="data-item">
                        <span class="label">Nivel</span>
                        <span class="value" id="display-level">N/A</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // MEMORIA LOCAL: Evita consultas repetidas a la red
        const localMemory = {};

        async function processDiscovery() {
            const val = document.getElementById('binInput').value;
            const card = document.getElementById('mainCard');
            const status = document.getElementById('status-bar');

            if (val.length === 6) {
                const bin = val.substring(0, 6);
                
                // 1. Verificar Memoria
                if (localMemory[bin]) {
                    status.innerHTML = "RECUPERADO DE MEMORIA <span class='glow'>✓</span>";
                    renderData(localMemory[bin], bin);
                    return;
                }

                status.innerText = "CONECTANDO CON SERVIDORES...";
                card.classList.remove('show');

                try {
                    // 2. INTENTO A: HandyAPI (Directa)
                    let response = await fetch(`https://data.handyapi.com/bin/${bin}`);
                    let data = await response.json();

                    if (data.Status === "SUCCESS" && data.Bank) {
                        const cleanData = {
                            bank: data.Bank,
                            country: data.Country?.Name || "GLOBAL",
                            brand: data.Scheme,
                            type: data.Type,
                            level: data.Brand || "STANDARD"
                        };
                        saveAndRender(cleanData, bin);
                    } else {
                        // 3. INTENTO B: Binlist con Rescate (Proxy)
                        status.innerText = "FUENTE A VACÍA. INICIANDO RESCATE...";
                        const proxy = "https://api.allorigins.win/get?url=";
                        const target = `https://lookup.binlist.net/${bin}`;
                        
                        const res2 = await fetch(proxy + encodeURIComponent(target));
                        const wrapper = await res2.json();
                        const d2 = JSON.parse(wrapper.contents);

                        if (d2) {
                            const cleanData = {
                                bank: d2.bank?.name || "BANCO NO ESPECIFICADO",
                                country: d2.country?.name || "INTERNACIONAL",
                                brand: d2.scheme || "CARD",
                                type: d2.type || "N/A",
                                level: d2.brand || "PREMIUM"
                            };
                            saveAndRender(cleanData, bin);
                        } else {
                            throw new Error("Sin datos");
                        }
                    }
                } catch (err) {
                    status.innerHTML = "<span style='color:#f87171'>ERROR: BASES DE DATOS SATURADAS</span>";
                    console.error("Error en flujo:", err);
                }
            } else {
                card.classList.remove('show');
                status.innerText = val.length > 0 ? `ESPERANDO ${6 - val.length} DÍGITOS...` : "LISTO PARA ESCANEAR";
            }
        }

        function saveAndRender(data, bin) {
            localMemory[bin] = data; // Guardar para no volver a gastar internet
            renderData(data, bin);
            document.getElementById('status-bar').innerHTML = "DATOS ACTUALIZADOS <span class='glow'>✓</span>";
        }

        function renderData(d, bin) {
            document.getElementById('display-bank').innerText = d.bank.toUpperCase();
            document.getElementById('display-country').innerText = d.country;
            document.getElementById('display-brand').innerText = d.brand.toUpperCase();
            document.getElementById('display-type').innerText = d.type.toUpperCase();
            document.getElementById('display-level').innerText = d.level.toUpperCase();
            document.getElementById('display-num').innerText = bin.slice(0,4) + " " + bin.slice(4,6) + "XX XXXX";
            
            document.getElementById('mainCard').classList.add('show');
        }
    </script>
</body>
</html>
