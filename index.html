<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIN Finder Pro - Ultra Fast</title>
    <style>
        :root { --accent: #00f2ff; --bg: #030712; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
        }
        input {
            background: #111827; border: 1px solid #1f2937; border-radius: 12px;
            color: white; font-size: 1.6rem; padding: 12px; text-align: center;
            width: 260px; outline: none; letter-spacing: 5px; margin-bottom: 30px;
        }
        .card {
            width: 380px; height: 230px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            backdrop-filter: blur(15px); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); padding: 30px;
            box-sizing: border-box; opacity: 0; transition: 0.5s;
        }
        .card.active { opacity: 1; transform: scale(1); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .chip { width: 45px; height: 35px; background: #eab308; border-radius: 6px; margin-bottom: 20px; }
        .bank { position: absolute; top: 30px; right: 30px; font-weight: 700; color: #94a3b8; font-size: 0.8rem; }
        .num { font-size: 1.5rem; letter-spacing: 3px; }
        .footer { display: flex; margin-top: 30px; gap: 25px; font-size: 0.8rem; }
        #status { margin-bottom: 10px; font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>

    <h2 style="font-weight: 200; color: #94a3b8;">Buscador Directo</h2>
    <div id="status"></div>
    <input type="number" id="binInput" placeholder="461046" oninput="buscar()">

    <div class="card" id="card">
        <div class="bank" id="b-name">BANCO</div>
        <div class="chip"></div>
        <div class="num" id="b-num">0000 00XX XXXX</div>
        <div class="footer">
            <div id="b-country">PAÍS: ---</div>
            <div id="b-brand">MARCA: ---</div>
            <div id="b-type">TIPO: ---</div>
        </div>
    </div>

<script>
    async function buscar() {
        const bin = document.getElementById('binInput').value;
        const card = document.getElementById('card');
        const status = document.getElementById('status');

        if (bin.length === 6) {
            status.innerText = "Buscando datos...";
            
            try {
                // FUENTE DIRECTA: HandyAPI (No suele pedir proxy ni API Key)
                const response = await fetch(`https://data.handyapi.com/bin/${bin}`);
                const d = await response.json();

                if (d.Status === "SUCCESS") {
                    document.getElementById('b-name').innerText = (d.Bank || 'BANCO PRIVADO').toUpperCase();
                    document.getElementById('b-country').innerText = "PAÍS: " + (d.Country?.Name || 'N/A');
                    document.getElementById('b-brand').innerText = "MARCA: " + (d.Scheme || 'N/A').toUpperCase();
                    document.getElementById('b-type').innerText = "TIPO: " + (d.Type || 'N/A').toUpperCase();
                    document.getElementById('b-num').innerText = bin.slice(0,4) + " " + bin.slice(4,6) + "XX XXXX";
                    
                    status.innerText = "✓ Encontrado";
                    card.classList.add('active');
                } else {
                    status.innerText = "BIN no encontrado en esta base.";
                }
            } catch (e) {
                status.innerText = "Error de conexión. Intenta otro BIN.";
                console.error(e);
            }
        } else {
            card.classList.remove('active');
            status.innerText = "";
        }
    }
</script>

</body>
</html>
