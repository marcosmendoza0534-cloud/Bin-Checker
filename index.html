<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIN Diagnostic Tool</title>
    <style>
        body { background: #0a0c10; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .console { background: #111827; padding: 25px; border-radius: 15px; border: 1px solid #374151; width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { background: #000; border: 2px solid #4b5563; color: #00f2ff; font-size: 1.8rem; padding: 10px; width: 90%; text-align: center; border-radius: 8px; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: #6366f1; }
        
        /* Mensajes de Error Dinámicos */
        .error-log { font-size: 0.85rem; padding: 12px; border-radius: 8px; display: none; margin-top: 15px; border-left: 4px solid; }
        .err-critical { background: rgba(239, 68, 68, 0.1); color: #f87171; border-color: #ef4444; }
        .err-warn { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: #f59e0b; }
        
        .success-card { background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; padding: 15px; border-radius: 10px; display: none; margin-top: 15px; }
        .label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="console">
        <h3 style="margin-top: 0; font-weight: 400; color: #94a3b8;">Monitor de Diagnóstico</h3>
        <input type="number" id="binInput" placeholder="457101" oninput="diagnosticar()">
        
        <div id="status-text" style="font-size: 0.75rem; color: #6366f1;">Esperando 6 dígitos...</div>

        <div id="errorBox" class="error-log"></div>

        <div id="successBox" class="success-card">
            <span class="label">Banco</span> <div id="r-bank"></div>
            <span class="label">País / Marca</span> <div id="r-meta"></div>
        </div>
    </div>

<script>
    async function diagnosticar() {
        const bin = document.getElementById('binInput').value;
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const statusText = document.getElementById('status-text');

        // Resetear vista
        errorBox.style.display = "none";
        successBox.style.display = "none";

        if (bin.length === 6) {
            statusText.innerText = "Iniciando peticion HTTP...";
            
            try {
                const response = await fetch(`https://data.handyapi.com/bin/${bin}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: El servidor de la API rechazó la conexión.`);
                }

                const data = await response.json();

                if (data.Status === "SUCCESS") {
                    document.getElementById('r-bank').innerText = data.Bank || "BANCO DESCONOCIDO";
                    document.getElementById('r-meta').innerText = `${data.Country?.Name || 'N/A'} - ${data.Scheme || 'N/A'}`;
                    successBox.style.display = "block";
                    statusText.innerText = "✓ Conexión establecida y datos recibidos.";
                } else {
                    errorBox.className = "error-log err-warn";
                    errorBox.innerText = "PROBLEMA: La API funciona, pero ese BIN no existe en su base de datos.";
                    errorBox.style.display = "block";
                }

            } catch (err) {
                errorBox.className = "error-log err-critical";
                
                // DETECCIÓN DE PROBLEMAS ESPECÍFICOS
                if (err.message.includes('Failed to fetch')) {
                    errorBox.innerText = "PROBLEMA: Error de CORS o Red. Tu navegador bloqueó la salida de datos a la API. (Prueba desactivando extensiones o usando modo incógnito).";
                } else {
                    errorBox.innerText = "PROBLEMA: " + err.message;
                }
                
                errorBox.style.display = "block";
                statusText.innerText = "✖ Fallo en la comunicación.";
            }
        } else {
            statusText.innerText = `Faltan ${6 - bin.length} números...`;
        }
    }
</script>

</body>
</html>
